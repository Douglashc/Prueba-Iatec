<div
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-900 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-2xl">
        <div>
            <h2 class="mt-4 text-center text-3xl font-extrabold text-gray-900">
                Crea tu cuenta
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Únete a la Agenda IATec
            </p>
        </div>

        <form class="mt-8 space-y-4" [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Usuario</label>
                    <input formControlName="username" type="text"
                        class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent sm:text-sm"
                        placeholder="Nombre de usuario">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Contraseña</label>
                    <input formControlName="password" type="password"
                        class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent sm:text-sm"
                        placeholder="Mínimo 6 caracteres">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Confirmar Contraseña</label>
                    <input formControlName="confirmPassword" type="password"
                        class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent sm:text-sm"
                        placeholder="Repite tu contraseña">
                    <p *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched"
                        class="text-red-500 text-[10px] mt-1 font-bold">Las contraseñas no coinciden</p>
                </div>
            </div>

            <div *ngIf="errorMessage"
                class="text-red-500 text-xs text-center font-bold bg-red-50 p-2 rounded-lg border border-red-100">
                {{ errorMessage }}
            </div>

            <div class="pt-2">
                <button type="submit" [disabled]="registerForm.invalid || loading"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 transition-all duration-200 shadow-lg shadow-indigo-200">
                    {{ loading ? 'Registrando...' : 'Registrarse' }}
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="text-sm text-gray-500">
                    ¿Ya tienes cuenta?
                    <a routerLink="/login" class="font-bold text-indigo-600 hover:text-indigo-500 transition">Inicia
                        sesión aquí</a>
                </p>
            </div>
        </form>
    </div>
</div>
