<div class="min-h-screen bg-slate-50 flex flex-col">
    <header
        class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">A</div>
            <h1 class="text-xl font-bold text-slate-800">Agenda IATec</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm text-slate-500 hidden md:block">Bienvenido, <strong>{{ user }}</strong></span>
            <button (click)="logout()"
                class="text-sm font-semibold text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg transition">
                Salir
            </button>
        </div>
    </header>

    <div class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8">

        <main class="lg:col-span-3 space-y-10">

            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-slate-900">Mi Agenda Personal</h2>

                <app-event-form [isVisible]="showModal" (onClose)="handleCloseModal()" (onSaved)="refreshData()"
                    [selectedEventEdit]="selectedEvent">
                </app-event-form>

                <button (click)="showModal = true"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all active:scale-95">
                    + Crear Evento
                </button>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 mb-6 shadow-sm flex flex-wrap gap-4 items-end">

                <div class="flex-1 min-w-[200px]">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Buscar evento</label>
                    <div class="relative">
                        <input type="text" [(ngModel)]="filterText" (input)="refreshData()"
                            placeholder="Nombre o descripción..."
                            class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>

                <div class="w-full md:w-auto">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Fecha
                        específica</label>
                    <input type="date" [(ngModel)]="filterDate" (change)="refreshData()"
                        class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition text-slate-600 text-sm">
                </div>

                <button (click)="clearFilters()"
                    class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition">
                    Limpiar
                </button>
            </div>

            <section *ngIf="currentEvents.length > 0" class="space-y-4">
                <div class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Sucediendo Ahora</h3>
                </div>
                <div class="grid grid-cols-1 gap-4">
                    <app-current-events *ngFor="let currentEvent of currentEvents"
                        [currentEvent]="currentEvent"
                        (onOpenEditModal)="openEditModal($event)"
                        (onConfirmDelete)="confirmDelete($event)"
                        (onChangeStatus)="changeEventStatus($event)"
                    ></app-current-events>
                </div>
            </section>

            <section class="space-y-4">
                <div class="flex items-center gap-2">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Próximos Eventos</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
                    <app-upcoming-events *ngFor="let ev of upcomingEvents" [event]="ev" (onEdit)="openEditModal($event)"
                        (onDelete)="confirmDelete($event)"
                        (onInvite)="selectedEventId = $event; showInviteModal = true"
                        (onChangeStatus)="changeEventStatus($event)"
                        >
                    </app-upcoming-events>
                </div>

                <div *ngIf="upcomingEvents.length === 0 && !loading"
                    class="col-span-full py-16 bg-white border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center text-slate-400">
                    <p class="text-sm font-medium">No hay eventos próximos programados</p>
                </div>

                <app-invite-event-form 
                    [isVisible]="showInviteModal" 
                    [eventId]="selectedEventId"
                    (onClose)="showInviteModal = false">
                </app-invite-event-form>
            </section>

            <section *ngIf="oldEvents.length > 0" class="space-y-4">
                <div class="flex items-center gap-2 mb-4">
                    <span class="relative flex h-3 w-3">
                        <span class="absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Eventos Expirados</h3>
                </div>
                <div class="grid grid-cols-1 gap-4">
                    <app-old-events *ngFor="let oldEvent of oldEvents"
                        [oldEvent]="oldEvent"
                        (onConfirmDelete)="confirmDelete($event)"
                    ></app-old-events>
                </div>
            </section>
        </main>

        <aside class="space-y-6">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                Invitaciones
                <span *ngIf="invitations.length > 0"
                    class="bg-indigo-600 text-white text-[10px] px-2 py-0.5 rounded-full">
                    {{invitations.length}}
                </span>
            </h2>

            <div class="space-y-4">
                <div *ngFor="let inv of invitations"
                    class="bg-indigo-900 text-white p-5 rounded-2xl shadow-lg shadow-indigo-100 relative overflow-hidden group">
                    <div class="relative z-10">
                        <p class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Nueva Invitación</p>
                        <h4 class="font-bold text-lg mt-1">{{inv.event.name}}</h4>
                        <p class="text-xs text-indigo-200 mt-1">{{ inv.event.startDate | date:'short' }}</p>
                        <div class="flex gap-2 mt-4">
                            <button (click)="handleInvitation(inv.id, true)"
                                class="flex-1 bg-white text-indigo-900 text-xs font-bold py-2 rounded-lg hover:bg-indigo-50 transition">Aceptar</button>
                            <button (click)="handleInvitation(inv.id, false)"
                                class="flex-1 bg-indigo-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-indigo-700 transition">Rechazar</button>
                        </div>
                    </div>
                    <div
                        class="absolute -right-4 -bottom-4 w-16 h-16 bg-white/10 rounded-full group-hover:scale-150 transition-transform duration-700">
                    </div>
                </div>

                <p *ngIf="invitations.length === 0"
                    class="text-center py-10 bg-white rounded-2xl text-slate-400 text-sm border border-slate-200 italic">
                    Sin invitaciones pendientes
                </p>
            </div>
        </aside>
    </div>
</div>
