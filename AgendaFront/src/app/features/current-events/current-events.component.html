<div
    class="bg-white border-l-4 border-green-500 p-4 rounded-xl shadow-sm flex justify-between items-center group transition-all hover:shadow-md">

    <div class="flex-1">
        <div class="flex items-center gap-2">
            <h4 class="font-bold text-slate-800">{{ currentEvent.name }}</h4>
            <span
                class="text-[9px] bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-black uppercase tracking-tighter">
                En curso
            </span>
            <span
                class="text-[9px] bg-gray-100 text-gray-700 px-1.5 py-0.5 rounded font-black uppercase tracking-tighter">
                {{ currentEvent.status ? "Habilitado" : "Desabilitado" }}
            </span>
        </div>
        <p class="text-xs text-slate-500 mt-0.5">
            {{ currentEvent.location }} • Finaliza {{ currentEvent.endDate | date:'medium' }}
        </p>
    </div>

    <div class="flex items-center gap-1 ml-4 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
        <button (click)="onChangeStatus.emit(currentEvent.id)" [title]="currentEvent.status ? 'Desactivar' : 'Activar'"
            class="p-2 rounded-lg transition-colors"
            [ngClass]="currentEvent.status ? 'text-emerald-500 hover:bg-emerald-50' : 'text-slate-400 hover:bg-slate-100'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    [attr.d]="currentEvent.status 
                    ? 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' 
                    : 'M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636'">
                </path>
            </svg>
        </button>

        <button (click)="onOpenEditModal.emit(currentEvent)"
            class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Editar">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z">
                </path>
            </svg>
        </button>
        <button (click)="onConfirmDelete.emit(currentEvent.id)"
            class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Eliminar">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                </path>
            </svg>
        </button>
    </div>
</div>
