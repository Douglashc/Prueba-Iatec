<div *ngIf="isVisible" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <h3 class="text-xl font-bold text-slate-800">{{ isEditMode ? 'Editar Evento' : 'Agendar Nuevo Evento' }}
            </h3>
            <button (click)="close()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>

        <form [formGroup]="eventForm" (ngSubmit)="save()" class="p-6 space-y-4">
            <div *ngIf="errorMessage" class="p-3 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100">
                {{ errorMessage }}
            </div>

            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Título</label>
                <input formControlName="name" type="text"
                    class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Descripcion</label>
                <input formControlName="description" type="text"
                    class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:border-indigo-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Fecha Inicio</label>
                    <input formControlName="startDate" type="datetime-local" class="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl 
                    focus:ring-2 focus:ring-indigo-500 outline-none transition text-slate-600">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Fecha Termina</label>
                    <input formControlName="endDate" type="datetime-local" class="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl 
                    focus:ring-2 focus:ring-indigo-500 outline-none transition text-slate-600">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Tipo</label>
                <select formControlName="type" class="w-full px-4 py-2 rounded-xl border border-slate-200">
                    <option [value]="0">Evento Compartido</option>
                    <option [value]="1">Evento Exclusivo</option>
                </select>
            </div>

            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Lugar</label>
                <input formControlName="location" type="text"
                    class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="text-xs font-bold text-slate-400 uppercase">Estado</label>
                <select formControlName="status" class="w-full px-4 py-2 rounded-xl border border-slate-200">
                    <option [ngValue]="true">Activar</option>
                    <option [ngValue]="false">Desactivar</option>
                </select>
            </div>

            <button type="submit" [disabled]="eventForm.invalid"
                class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 disabled:opacity-50">
                {{ isEditMode ? 'Actualizar Evento' : 'Confirmar Evento' }}
            </button>
        </form>
    </div>
</div>
