<div *ngIf="isVisible"
    class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-[2px]">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in duration-150">

        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-indigo-50/50">
            <h3 class="text-sm font-bold text-indigo-900 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z">
                    </path>
                </svg>
                Enviar Invitación
            </h3>
            <button (click)="close()" class="text-slate-400 hover:text-slate-600 transition">✕</button>
        </div>

        <div class="p-6 space-y-4">
            <p class="text-xs text-slate-500 leading-relaxed">
                Ingresa el nombre de usuario de la persona que quieres invitar a este evento. Recibirá una
                notificación en su dashboard.
            </p>

            <div class="relative">
                <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-1">Username del
                    Invitado</label>
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <span
                            class="absolute inset-y-0 left-0 pl-3 flex items-center text-indigo-400 font-bold">@</span>
                        <input type="text" [(ngModel)]="username" placeholder="ej: mariel_ch"
                            class="w-full pl-8 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition text-sm">
                    </div>
                </div>
            </div>

            <div *ngIf="errorMessage" class="animate-in fade-in slide-in-from-top-1">
                <p class="text-[10px] font-bold text-red-500 bg-red-50 p-2 rounded-lg border border-red-100">
                    ⚠ {{ errorMessage }}
                </p>
            </div>

            <div class="flex gap-2 pt-2">
                <button (click)="close()"
                    class="flex-1 py-2.5 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition">
                    Cancelar
                </button>
                <button (click)="send()" [disabled]="!username || loading"
                    class="flex-1 py-2.5 bg-indigo-600 text-white text-xs font-bold rounded-xl hover:bg-indigo-700 disabled:opacity-50 shadow-lg shadow-indigo-200 transition flex items-center justify-center gap-2">
                    <span *ngIf="loading"
                        class="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                    {{ loading ? 'Enviando...' : 'Enviar Invitación' }}
                </button>
            </div>
        </div>
    </div>
</div>
